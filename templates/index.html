<!DOCTYPE html>
<html>
<head>
    <title>AI Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
        }

        input {
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>AI vs Real Detector</h1>

<div class="container">

    <!-- TEXT -->
    <div class="card">
        <h3>Text Detection</h3>
        <form method="POST" action="/text">
            <textarea name="text" placeholder="Enter text..."></textarea>
            <button type="submit">Check Text</button>
        </form>

        <div class="result">
            {% if text_result %}
                <p>
                    <b>{{ text_result }}</b>
                </p>
                <p>AI Probability: {{ ai_prob }}%</p>
                <p>Perplexity: {{ perplexity }}</p>
            {% endif %}
        </div>
    </div>

    <!-- IMAGE -->
    <div class="card">
        <h3>Image Detection</h3>
        <form method="POST" action="/image" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">Check Image</button>
        </form>

        <div class="result">
            {% if image_result %}
                <p>
                    <b>{{ image_result }}</b>
                </p>
            {% endif %}
        </div>
    </div>

</div>

</body>
</html>
